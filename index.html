<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SDF Ray Marcher</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    height: 100%;
    background: #0b0d12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8eaf0;
  }
  #glcanvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: grab;
  }
  #glcanvas:active {
    cursor: grabbing;
  }
  #panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(15, 17, 23, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 300px;
    backdrop-filter: blur(6px);
  }
  #panel h1 {
    font-size: 14px;
    margin: 0 0 8px;
    font-weight: 600;
  }
  #panel label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
  }
  #panel input[type="range"] {
    flex: 1;
  }
  #status {
    color: #ff8a8a;
    font-size: 12px;
    margin-top: 6px;
  }
  #hint {
    opacity: 0.65;
    font-size: 12px;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <canvas id="glcanvas"></canvas>
  <div id="panel">
    <h1>SDF Ray Marcher</h1>
    <label>
      Blend radius
      <input type="range" id="blendK" min="0.02" max="0.9" step="0.01" value="0.35" />
    </label>
    <label>
      <input type="checkbox" id="shadowsOn" checked />
      Soft shadows
    </label>
    <label>
      <input type="checkbox" id="aoOn" checked />
      Ambient occlusion
    </label>
    <div id="hint">Drag to orbit, scroll to zoom.</div>
    <div id="status"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
